<!DOCTYPE html>
<html>
<head>
    <title>Quantification Simulator</title>
</head>
<body>

<h2>Quantification Simulator</h2>

<label>Emission Rate (kg/hr)</label>
<input id="rate" type="number" step="0.01">

<br><br>

<label>Duration (seconds)</label>
<input id="duration" type="number">

<br><br>

<label>Facility Identifier</label>
<input id="facility" type="text">

<br><br>

<button onclick="startRun()">Start</button>
<button onclick="downloadCSV()">Export CSV</button>

<hr>

<h3 id="facilityDisplay"></h3>
<h1 id="rateDisplay"></h1>

<script>

let csvData = [];

function startRun() {

    const rate = parseFloat(document.getElementById("rate").value);
    const duration = parseInt(document.getElementById("duration").value);
    const facility = document.getElementById("facility").value.trim();

    if (rate <= 0 || isNaN(rate)) {
        alert("Emission rate must be greater than 0");
        return;
    }

    if (duration <= 0 || isNaN(duration)) {
        alert("Duration must be greater than 0");
        return;
    }

    if (facility === "") {
        alert("Facility identifier cannot be blank");
        return;
    }

    document.getElementById("facilityDisplay").innerText =
        "Facility: " + facility;

    document.getElementById("rateDisplay").innerText =
        rate + " kg/hr";

    csvData = [];

    const startTime = new Date();

    let counter = 0;

    const interval = setInterval(() => {

        const currentTime =
            new Date(startTime.getTime() + counter * 1000);

        csvData.push({
            time: currentTime.toISOString(),
            rate: rate
        });

        counter++;

        if (counter >= duration) {
            clearInterval(interval);
        }

    }, 1000);
}

function downloadCSV() {

    if (csvData.length === 0) {
        alert("No data available.");
        return;
    }

    const facility =
        document.getElementById("facility").value.trim();

    let csv = "Time,Quantification_kg_hr\n";

    csvData.forEach(row => {
        csv += `${row.time},${row.rate}\n`;
    });

    const blob = new Blob([csv], {
        type: "text/csv"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    const date =
        new Date().toISOString().split("T")[0];

    a.href = url;
    a.download = `${facility}_${date}.csv`;

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
