<!DOCTYPE html>
<html>
<head>
    <title>NonSense Methane Quantification Solution</title>
</head>
<body>

<h2>NonSense Methane Quantification Solution</h2>
<h3>Provide the required inputs below.<br>
Click "Start" to generate methane quantifications for your desired facility.<br> 
After clicking "Start", you may download the methane quantifications by clicking "Export CSV"</h3>

<label>Desired Methane Emission Rate (kg/hr): </label>
<input id="rate" type="number" step="0.01">

<br><br>

<label>Duration of Quantification (seconds): </label>
<input id="duration" type="number">

<br><br>

<label>Facility Identifier: </label>
<input id="facility" type="text">

<br><br>

<button onclick="startRun()">Start</button>
<button onclick="downloadCSV()">Export CSV</button>

<hr>

<h3 id="facilityDisplay"></h3>
<h1 id="rateDisplay"></h1>

<script>

let csvData = [];

function startRun() {

    const rate = parseFloat(document.getElementById("rate").value);
    const duration = parseInt(document.getElementById("duration").value);
    const facility = document.getElementById("facility").value.trim();

    // -----------------------
    // VALIDATION
    // -----------------------
    if (isNaN(rate) || rate <= 0) {
        alert("Emission rate must be greater than 0");
        return;
    }

    if (isNaN(duration) || duration <= 0) {
        alert("Duration must be greater than 0");
        return;
    }

    if (!facility) {
        alert("Facility identifier cannot be blank");
        return;
    }

    // -----------------------
    // UI SETUP
    // -----------------------
    document.getElementById("facilityDisplay").innerText =
        "Facility: " + facility;

    document.getElementById("rateDisplay").innerText =
        rate + " kg/hr";

    // -----------------------
    // PRE-GENERATE FULL DATASET
    // -----------------------
    const startTime = new Date();
    csvData = [];

    for (let i = 0; i < duration; i++) {
        csvData.push({
            time: new Date(startTime.getTime() + i * 1000),
            rate: rate
        });
    }

    // -----------------------
    // LIVE PLAYBACK
    // -----------------------
    let counter = 0;

    const interval = setInterval(() => {

        const row = csvData[counter];

        document.getElementById("rateDisplay").innerText =
            row.rate + " kg/hr";

        counter++;

        if (counter >= duration) {
            clearInterval(interval);

            // optional: clear UI at end
            setTimeout(() => {
                document.getElementById("rateDisplay").innerText = "";
                document.getElementById("facilityDisplay").innerText = "";
            }, 500);
        }

    }, 1000);
}

function downloadCSV() {

    if (csvData.length === 0) {
        alert("No data available.");
        return;
    }

    const facility =
        document.getElementById("facility").value.trim();

    let csv = "Time,Quantification_kg_hr\n";

    csvData.forEach(row => {
        csv += `${row.time},${row.rate}\n`;
    });

    const blob = new Blob([csv], {
        type: "text/csv"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    const date =
        new Date().toISOString().split("T")[0];

    a.href = url;
    a.download = `${facility}_${date}.csv`;

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
